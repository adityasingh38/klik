name: Bug report
description: Something in Klik isn't working as expected
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open Klik
        2. Search for '...'
        3. Select '...' and click 'Get Your Klik'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: Klik version
      placeholder: e.g. 0.1.0 (Help > About, or the installer filename)
    validations:
      required: false
  - type: dropdown
    id: client
    attributes:
      label: Which client were you installing into?
      options:
        - Claude Desktop
        - Cursor
        - VS Code
        - Not applicable
    validations:
      required: false
