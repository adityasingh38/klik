<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!--
    Klik's mark: four quadrants, two of which travel. At rest it reads as one solid
    tile; in the app the two lighter quadrants seat into place with a spring, which is
    the product's verb. This is the static form used for the app icon.
  -->
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#12211D"/>
      <stop offset="1" stop-color="#0B1512"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="114" fill="url(#tile)"/>

  <!--
    No border. A hairline at 512 becomes a heavy ring by the time Windows draws the
    icon at 32px, and it read as the logo rather than as an edge. The blocks are the
    mark, so they carry the tile on their own.
  -->
  <g transform="translate(72 72) scale(11.5)">
    <!-- Anchored quadrants -->
    <path d="M4 8a4 4 0 0 1 4-4h7v10a2 2 0 0 1-2 2H4V8Z" fill="#43C9A6"/>
    <path d="M17 16h11v8a4 4 0 0 1-4 4h-7V16Z" fill="#43C9A6"/>
    <!-- Travelling quadrants -->
    <path d="M17 4h7a4 4 0 0 1 4 4v6H19a2 2 0 0 1-2-2V4Z" fill="#43C9A6" opacity=".55"/>
    <path d="M4 18h9a2 2 0 0 1 2 2v8H8a4 4 0 0 1-4-4v-6Z" fill="#43C9A6" opacity=".55"/>
  </g>
</svg>
